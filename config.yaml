pdfs:
  - filename: "desenvolvimento_paranaense.pdf"
  - filename: "analise_conjuntural_2025.pdf"
  - filename: "avaliacoes_politicas_publicas.pdf"

paths:
  raw: "data/raw/"
  processed: "data/processed/"
  models: "models/"

chunking:
  chunk_size: 512
  overlap: 64
  # linhas repetidas em >= threshold_ratio das páginas são descartadas como cabeçalho/rodapé
  header_frequency_threshold: 0.30
  # linhas com menos chars que este valor são artefatos de paginação nos PDFs do IPARDES
  min_line_chars: 20

retrieval:
  top_k_initial: 20
  top_k_final: 3
  # 0.84 calibrado empiricamente: out-of-scope máximo observado = 0.831 (Bitcoin, xadrez, etc.)
  # in-scope mínimo observado = 0.859 (desocupação, PRISMA) — margem de 0.028 acima do ruído
  min_score_threshold: 0.84
  lambda_mmr: 0.5

embedding:
  model_name: "intfloat/multilingual-e5-large"
  # batch_size=64: GPU (RTX 3050) processa batches maiores sem overhead extra;
  # em CPU puro o ganho é marginal mas não prejudica — mantém retrocompatibilidade.
  batch_size: 64

reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"

faiss:
  # M=32: ponto de equilíbrio recall/RAM para corpus pequeno (~5 000 chunks)
  m: 32
  # ef_construction=200: valor padrão recomendado — grafo de qualidade sem overhead excessivo
  ef_construction: 200
  # ef_search=64: troca recall por latência; aumentar para 128 melhora ~1% recall a 2x custo
  ef_search: 64

llm:
  # llama3.2:3b escolhido para execução em CPU puro (sem GPU):
  # gemma2:9b exige ~6 GB VRAM para inferência rápida; em CPU puro demora > 5 min por resposta.
  # llama3.2:3b (~2 GB RAM) gera resposta em 8-12s no i5-13500 sem GPU — viável para avaliação.
  model: "llama3.2:3b"
  # localhost:11434 para Ollama nativo no host (sem Docker).
  # Se rodar dentro de container Docker, sobrescrever com API_BASE_URL=http://host.docker.internal:11434
  base_url: "http://localhost:11434"
  temperature: 0
  # max_tokens=150: resposta curta reduz o tempo de decode em CPU (~40% mais rápido que 512)
  max_tokens: 150
  context_window: 8192
  # timeout_seconds=180: margem segura para CPU i5-13500; gemma2:9b precisaria de 480+
  timeout_seconds: 360
  max_retries: 3

api:
  base_url: "http://localhost:8000"
