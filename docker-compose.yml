services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      # bind mount em ./models/ollama evita rebaixar o gemma2:9b (5 GB) a cada
      # restart — o modelo fica no repositório local junto com os demais artefatos
      - ./models/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
